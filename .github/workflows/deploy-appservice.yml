name: Deploy To Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20.x"
  AZURE_WEBAPP_NAME: "MajorPredictor"
  DEPLOY_PACKAGE_PATH: "release.zip"
  AZURE_CLIENT_ID: "de94e598-7d20-4a0e-a8d7-dbb7a5aa830d"
  AZURE_TENANT_ID: "72d30481-522b-407a-8c04-89e2bfca2ffa"
  AZURE_SUBSCRIPTION_ID: "dc7f66d1-9c70-4d43-b959-b85035b2c452"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Remove dev dependencies from deployment bundle
        run: npm prune --omit=dev

      - name: Create deployment archive
        run: zip -r "${{ env.DEPLOY_PACKAGE_PATH }}" dist package.json package-lock.json node_modules

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.DEPLOY_PACKAGE_PATH }}
